<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" style="font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;">
  <defs>
    <filter id="sketchy" x="-1%" y="-1%" width="102%" height="102%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" rx="12" fill="#fefefe"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Multi-Agent Orchestration Patterns</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#64748b">Sequential · Parallel · Hierarchical</text>

  <!-- ===== SEQUENTIAL SECTION ===== -->
  <rect x="18" y="65" width="784" height="115" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#sketchy)"/>
  <text x="36" y="87" font-size="11" font-weight="700" fill="#2563eb" letter-spacing="1.5">SEQUENTIAL (PIPELINE)</text>
  <text x="220" y="87" font-size="10" fill="#60a5fa">Linear — each agent passes output to next</text>

  <!-- Agent A -->
  <rect x="40" y="100" width="120" height="55" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="100" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Agent A</text>
  <text x="100" y="142" text-anchor="middle" font-size="10" fill="#3b82f6">Research</text>

  <!-- Arrow -->
  <path d="M 165 127 Q 195 124 218 127" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowB)" stroke-linecap="round"/>

  <!-- Agent B -->
  <rect x="228" y="100" width="120" height="55" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="288" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Agent B</text>
  <text x="288" y="142" text-anchor="middle" font-size="10" fill="#3b82f6">Draft</text>

  <!-- Arrow -->
  <path d="M 353 127 Q 383 124 406 127" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowB)" stroke-linecap="round"/>

  <!-- Agent C -->
  <rect x="416" y="100" width="120" height="55" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="476" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Agent C</text>
  <text x="476" y="142" text-anchor="middle" font-size="10" fill="#3b82f6">Review</text>

  <!-- Arrow -->
  <path d="M 541 127 Q 571 124 594 127" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowB)" stroke-linecap="round"/>

  <!-- Output -->
  <rect x="604" y="100" width="120" height="55" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="664" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Output</text>
  <text x="664" y="142" text-anchor="middle" font-size="10" fill="#3b82f6">Final Result</text>

  <!-- Risk label -->
  <rect x="742" y="102" width="50" height="20" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="767" y="116" text-anchor="middle" font-size="8" font-weight="600" fill="#dc2626">Bottleneck</text>

  <!-- ===== PARALLEL SECTION ===== -->
  <rect x="18" y="195" width="784" height="145" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#sketchy)"/>
  <text x="36" y="217" font-size="11" font-weight="700" fill="#16a34a" letter-spacing="1.5">PARALLEL (FAN-OUT / FAN-IN)</text>
  <text x="275" y="217" font-size="10" fill="#4ade80">Concurrent — agents work simultaneously</text>

  <!-- Input -->
  <rect x="40" y="237" width="110" height="55" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sketchy)"/>
  <text x="95" y="261" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Task</text>
  <text x="95" y="279" text-anchor="middle" font-size="10" fill="#16a34a">Fan-out</text>

  <!-- Fan-out arrows -->
  <path d="M 155 250 Q 195 232 228 240" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>
  <path d="M 155 265 Q 195 265 228 265" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>
  <path d="M 155 280 Q 195 298 228 290" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>

  <!-- Parallel agents -->
  <rect x="238" y="222" width="130" height="35" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sketchy)"/>
  <text x="303" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Agent 1</text>

  <rect x="238" y="265" width="130" height="35" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sketchy)"/>
  <text x="303" y="287" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Agent 2</text>

  <rect x="238" y="308" width="130" height="35" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sketchy)"/>
  <text x="303" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Agent 3</text>

  <!-- Parallel indicator -->
  <text x="390" y="255" font-size="18" fill="#16a34a" font-weight="700">&#x21C5;</text>
  <text x="390" y="300" font-size="18" fill="#16a34a" font-weight="700">&#x21C5;</text>

  <!-- Fan-in arrows -->
  <path d="M 373 240 Q 413 248 438 260" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>
  <path d="M 373 282 Q 413 275 438 268" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>
  <path d="M 373 325 Q 413 308 438 278" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>

  <!-- Merge -->
  <rect x="448" y="242" width="110" height="55" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="503" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Merge</text>
  <text x="503" y="283" text-anchor="middle" font-size="10" fill="#16a34a">Fan-in</text>

  <!-- Arrow to output -->
  <path d="M 563 269 Q 593 266 616 269" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>

  <!-- Output -->
  <rect x="626" y="242" width="110" height="55" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="681" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Output</text>
  <text x="681" y="283" text-anchor="middle" font-size="10" fill="#16a34a">Combined</text>

  <!-- Risk label -->
  <rect x="742" y="305" width="50" height="20" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="767" y="319" text-anchor="middle" font-size="8" font-weight="600" fill="#dc2626">Merge Risk</text>

  <!-- ===== HIERARCHICAL SECTION ===== -->
  <rect x="18" y="355" width="784" height="150" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#sketchy)"/>
  <text x="36" y="377" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="1.5">HIERARCHICAL (MANAGER-WORKER)</text>
  <text x="310" y="377" font-size="10" fill="#a78bfa">Orchestrator delegates to specialists</text>

  <!-- Orchestrator -->
  <rect x="300" y="392" width="180" height="55" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="390" y="416" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Orchestrator</text>
  <text x="390" y="434" text-anchor="middle" font-size="10" fill="#7c3aed">Plans &amp; Delegates</text>

  <!-- Delegation arrows -->
  <path d="M 320 450 Q 200 465 145 468" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowV)" stroke-linecap="round"/>
  <path d="M 370 450 Q 360 465 350 468" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowV)" stroke-linecap="round"/>
  <path d="M 430 450 Q 440 465 450 468" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowV)" stroke-linecap="round"/>
  <path d="M 460 450 Q 580 465 635 468" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowV)" stroke-linecap="round"/>

  <!-- Worker agents -->
  <rect x="40" y="472" width="120" height="25" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="100" y="490" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Coder</text>

  <rect x="195" y="472" width="120" height="25" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="255" y="490" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Researcher</text>

  <rect x="350" y="472" width="120" height="25" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="410" y="490" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Reviewer</text>

  <rect x="505" y="472" width="120" height="25" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="565" y="490" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Deployer</text>

  <!-- Risk label -->
  <rect x="710" y="405" width="80" height="20" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="750" y="419" text-anchor="middle" font-size="8" font-weight="600" fill="#dc2626">Single Point of Failure</text>

  <!-- Step labels -->
  <circle cx="28" cy="65" r="9" fill="#3b82f6"/>
  <text x="28" y="69" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>

  <circle cx="28" cy="195" r="9" fill="#22c55e"/>
  <text x="28" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>

  <circle cx="28" cy="355" r="9" fill="#8b5cf6"/>
  <text x="28" y="359" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
</svg>