<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" style="font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;">
  <defs>
    <filter id="sketchy" x="-1%" y="-1%" width="102%" height="102%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="440" rx="12" fill="#fefefe"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Precision vs Recall Tradeoff</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#64748b">Every threshold encodes a product decision</text>

  <!-- ===== LEFT: HIGH PRECISION ===== -->
  <rect x="30" y="65" width="370" height="190" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#sketchy)"/>
  <rect x="30" y="65" width="370" height="30" rx="10" fill="#3b82f6" filter="url(#sketchy)"/>
  <rect x="30" y="78" width="370" height="17" fill="#3b82f6"/>
  <text x="215" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="white">HIGH PRECISION</text>

  <!-- Precision visual: few flagged, most correct -->
  <text x="55" y="120" font-size="11" font-weight="600" fill="#1e40af">Flagged items: mostly correct</text>

  <!-- Visual: 10 circles, 9 blue (correct), 1 red (wrong) -->
  <circle cx="60" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="90" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="120" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="150" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="180" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="210" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="240" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="270" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="300" cy="145" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="330" cy="145" r="10" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <text x="360" y="150" font-size="10" fill="#64748b">= 90%</text>

  <!-- But: missed items shown as gray -->
  <text x="55" y="180" font-size="11" font-weight="600" fill="#dc2626">Missed real cases:</text>
  <circle cx="168" cy="176" r="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="186" cy="176" r="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="204" cy="176" r="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="222" cy="176" r="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="240" cy="176" r="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="260" y="180" font-size="10" fill="#94a3b8">many missed</text>

  <!-- Use case -->
  <rect x="50" y="200" width="330" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="215" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Prioritize when False Positives are costly</text>
  <text x="215" y="234" text-anchor="middle" font-size="10" fill="#3b82f6">Fraud detection, content removal, account bans</text>

  <!-- ===== RIGHT: HIGH RECALL ===== -->
  <rect x="420" y="65" width="370" height="190" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#sketchy)"/>
  <rect x="420" y="65" width="370" height="30" rx="10" fill="#22c55e" filter="url(#sketchy)"/>
  <rect x="420" y="78" width="370" height="17" fill="#22c55e"/>
  <text x="605" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="white">HIGH RECALL</text>

  <!-- Recall visual: found most, but some wrong -->
  <text x="445" y="120" font-size="11" font-weight="600" fill="#166534">Found cases: caught almost all</text>

  <!-- Visual: 10 circles, 7 green (correct), 3 orange (false alarm) -->
  <circle cx="450" cy="145" r="10" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
  <circle cx="480" cy="145" r="10" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
  <circle cx="510" cy="145" r="10" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
  <circle cx="540" cy="145" r="10" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
  <circle cx="570" cy="145" r="10" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
  <circle cx="600" cy="145" r="10" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
  <circle cx="630" cy="145" r="10" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
  <circle cx="660" cy="145" r="10" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <circle cx="690" cy="145" r="10" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <circle cx="720" cy="145" r="10" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <text x="750" y="150" font-size="10" fill="#64748b">= 95%</text>

  <!-- But: false alarms -->
  <text x="445" y="180" font-size="11" font-weight="600" fill="#dc2626">False alarms:</text>
  <circle cx="540" cy="176" r="6" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <circle cx="558" cy="176" r="6" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <circle cx="576" cy="176" r="6" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <circle cx="594" cy="176" r="6" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <circle cx="612" cy="176" r="6" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <text x="632" y="180" font-size="10" fill="#dc2626">many false alarms</text>

  <!-- Use case -->
  <rect x="440" y="200" width="330" height="42" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="605" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Prioritize when False Negatives are dangerous</text>
  <text x="605" y="234" text-anchor="middle" font-size="10" fill="#16a34a">Cancer screening, security threats, safety alerts</text>

  <!-- ===== CENTER: TRADEOFF VISUALIZATION ===== -->
  <text x="410" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">The Tradeoff</text>

  <!-- Seesaw/balance visualization -->
  <!-- Fulcrum -->
  <polygon points="410,380 395,400 425,400" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>

  <!-- Balance beam -->
  <line x1="180" y1="350" x2="640" y2="350" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <!-- Left side: Precision weight -->
  <rect x="170" y="310" width="130" height="38" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="235" y="327" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Precision</text>
  <text x="235" y="342" text-anchor="middle" font-size="9" fill="#3b82f6">"When we flag, we're right"</text>

  <!-- Right side: Recall weight -->
  <rect x="520" y="310" width="130" height="38" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sketchy)"/>
  <text x="585" y="327" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Recall</text>
  <text x="585" y="342" text-anchor="middle" font-size="9" fill="#16a34a">"We find everything"</text>

  <!-- Center: F1 -->
  <rect x="365" y="300" width="90" height="28" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#sketchy)"/>
  <text x="410" y="319" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">F1 Score</text>

  <!-- Key insight -->
  <rect x="160" y="410" width="500" height="22" rx="8" fill="#fef9c3" stroke="#fbbf24" stroke-width="1"/>
  <text x="410" y="425" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">The PM decides: which errors can users tolerate? That defines the threshold.</text>

  <!-- Legend -->
  <circle cx="60" cy="420" r="6" fill="#3b82f6"/>
  <text x="72" y="424" font-size="9" fill="#64748b">True Positive</text>
  <circle cx="145" cy="420" r="6" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <text x="157" y="424" font-size="9" fill="#64748b">False Positive/Negative</text>
  <circle cx="265" cy="420" r="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="277" y="424" font-size="9" fill="#64748b">Missed</text>
</svg>