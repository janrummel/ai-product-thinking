<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" style="font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;">
  <defs>
    <filter id="sketchy" x="-1%" y="-1%" width="102%" height="102%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" rx="12" fill="#fefefe"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">RAG Pipeline</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#64748b">Embed · Store · Retrieve · Generate</text>

  <!-- ===== INDEXING SECTION ===== -->
  <rect x="18" y="60" width="784" height="140" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#sketchy)"/>
  <text x="36" y="82" font-size="11" font-weight="700" fill="#2563eb" letter-spacing="1.5">INDEXING</text>
  <text x="108" y="82" font-size="11" fill="#60a5fa">(offline — einmalig pro Dokument)</text>

  <!-- Documents -->
  <rect x="35" y="98" width="130" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="100" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Documents</text>
  <text x="100" y="146" text-anchor="middle" font-size="10" fill="#3b82f6">PDFs, Docs, Wiki</text>

  <!-- Arrow -->
  <path d="M 170 128 Q 192 125 208 128" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowB)" stroke-linecap="round"/>

  <!-- Chunk -->
  <rect x="218" y="98" width="115" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="275" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Chunk</text>
  <text x="275" y="146" text-anchor="middle" font-size="10" fill="#3b82f6">512 Tokens + Overlap</text>

  <!-- Arrow -->
  <path d="M 338 128 Q 362 124 378 128" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowB)" stroke-linecap="round"/>

  <!-- Embed -->
  <rect x="388" y="98" width="130" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#sketchy)"/>
  <text x="453" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Embed</text>
  <text x="453" y="146" text-anchor="middle" font-size="10" fill="#b45309">Text → Vektoren</text>

  <!-- Arrow -->
  <path d="M 523 128 Q 548 124 568 128" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowV)" stroke-linecap="round"/>

  <!-- Vector DB -->
  <rect x="578" y="90" width="170" height="76" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="663" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Vector DB</text>
  <text x="663" y="140" text-anchor="middle" font-size="10" fill="#7c3aed">Pinecone · pgvector</text>
  <text x="663" y="156" text-anchor="middle" font-size="10" fill="#7c3aed">Weaviate · Qdrant</text>

  <!-- ===== VERTICAL BRIDGE ===== -->
  <path d="M 663 170 C 663 210 580 230 540 265" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowV)" stroke-linecap="round" stroke-dasharray="6 4"/>
  <text x="625" y="218" font-size="9" fill="#7c3aed" font-style="italic" transform="rotate(-25 625 218)">gespeicherte Vektoren</text>

  <!-- ===== QUERY SECTION ===== -->
  <rect x="18" y="245" width="784" height="220" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#sketchy)"/>
  <text x="36" y="267" font-size="11" font-weight="700" fill="#16a34a" letter-spacing="1.5">QUERY</text>
  <text x="88" y="267" font-size="11" fill="#4ade80">(runtime — pro Anfrage)</text>

  <!-- User Query -->
  <rect x="35" y="283" width="145" height="60" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sketchy)"/>
  <text x="107" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">User Query</text>
  <text x="107" y="330" text-anchor="middle" font-size="9" fill="#16a34a">"Wie viele Urlaubstage...?"</text>

  <!-- Arrow -->
  <path d="M 185 313 Q 210 310 228 313" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>

  <!-- Embed Query -->
  <rect x="238" y="283" width="120" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#sketchy)"/>
  <text x="298" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Embed</text>
  <text x="298" y="330" text-anchor="middle" font-size="10" fill="#b45309">Query → Vektor</text>

  <!-- Arrow -->
  <path d="M 363 313 Q 390 309 413 313" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)" stroke-linecap="round"/>

  <!-- Similarity Search -->
  <rect x="423" y="278" width="175" height="70" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2" filter="url(#sketchy)"/>
  <text x="510" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#9d174d">Similarity Search</text>
  <text x="510" y="323" text-anchor="middle" font-size="10" fill="#be185d">Hybrid: Vektor + BM25</text>
  <text x="510" y="340" text-anchor="middle" font-size="10" fill="#be185d">→ Top-K Chunks</text>

  <!-- Arrow down to LLM -->
  <path d="M 510 352 Q 508 370 510 388" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowO)" stroke-linecap="round"/>

  <!-- LLM + Context -->
  <rect x="350" y="395" width="290" height="55" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="2" filter="url(#sketchy)"/>
  <text x="495" y="418" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">LLM + Retrieved Context</text>
  <text x="495" y="438" text-anchor="middle" font-size="10" fill="#c2410c">"Laut diesen Dokumenten: [chunks]..."</text>

  <!-- Arrow left to Answer -->
  <path d="M 345 422 Q 295 419 235 422" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowO)" stroke-linecap="round"/>

  <!-- Answer -->
  <rect x="60" y="395" width="170" height="55" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="145" y="418" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Answer</text>
  <text x="145" y="438" text-anchor="middle" font-size="10" fill="#059669">+ Quellenangabe</text>

  <!-- Step labels (circled numbers) -->
  <circle cx="165" cy="88" r="9" fill="#3b82f6"/>
  <text x="165" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>

  <circle cx="353" cy="88" r="9" fill="#3b82f6"/>
  <text x="353" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>

  <circle cx="553" cy="88" r="9" fill="#8b5cf6"/>
  <text x="553" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>

  <circle cx="405" cy="275" r="9" fill="#22c55e"/>
  <text x="405" y="279" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>

  <circle cx="510" cy="387" r="9" fill="#f97316"/>
  <text x="510" y="391" text-anchor="middle" font-size="10" font-weight="700" fill="white">5</text>
</svg>
